<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>H-trace</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap');

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #000;
      color: #e8e8e8;
      font-family: 'IBM Plex Mono', monospace;
      font-weight: 300;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* scanlines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(to bottom,
          transparent 0px, transparent 3px,
          rgba(0, 0, 0, .15) 3px, rgba(0, 0, 0, .15) 4px);
      pointer-events: none;
      z-index: 100;
    }

    /* noise */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 99;
      opacity: .55;
    }

    .terminal {
      position: relative;
      z-index: 10;
      width: 900px;
      height: 520px;
      background: #020202;
      border: 1px solid #1e1e1e;
      box-shadow:
        0 0 0 1px #111,
        0 0 40px rgba(255, 255, 255, .03),
        4px 4px 0 #111;
      padding: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
      border-bottom: 1px solid #1a1a1a;
      background: #0a0a0a;
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .topbar-dots {
      display: flex;
      gap: 5px;
    }

    .topbar-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #222;
      border: 1px solid #333;
    }

    .topbar-title {
      font-size: 10px;
      color: #888;
      letter-spacing: .15em;
      text-transform: uppercase;
    }

    #clock {
      font-size: 10px;
      color: #777;
      letter-spacing: .08em;
    }

    .term-body {
      flex: 1;
      overflow-y: auto;
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .term-body::-webkit-scrollbar {
      width: 3px;
    }

    .term-body::-webkit-scrollbar-thumb {
      background: #1e1e1e;
    }

    .line {
      font-size: 11px;
      line-height: 1.75;
      color: #c8c8c8;
      white-space: pre-wrap;
      letter-spacing: .02em;
    }

    .line.boot {
      color: #888;
    }

    .line.cmd {
      color: #f0f0f0;
    }

    .line.output {
      color: #b0b0b0;
    }

    .line.error {
      color: #e05555;
    }

    .line.ok {
      color: #66aa66;
    }

    /* prompt line */
    .prompt-line {
      display: flex;
      align-items: center;
      gap: 0;
      font-size: 11px;
      color: #aaa;
      margin-top: 2px;
    }

    .prompt-sym {
      color: #777;
      flex-shrink: 0;
      letter-spacing: .02em;
    }

    input {
      background: transparent;
      border: none;
      outline: none;
      color: #f0f0f0;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 300;
      width: 100%;
      caret-color: #aaa;
      letter-spacing: .02em;
    }

    /* window popups inside terminal */
    .window {
      border: 1px solid #2a2a2a;
      border-left: 2px solid #555;
      padding: 10px 14px;
      margin: 8px 0;
      background: #050505;
      font-size: 10px;
      color: #aaa;
      line-height: 1.8;
      letter-spacing: .02em;
      white-space: pre-wrap;
    }

    .window::before {
      content: '';
      display: block;
      font-size: 9px;
      color: #222;
      letter-spacing: .15em;
      text-transform: uppercase;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid #111;
    }
  </style>
</head>

<body>

  <div class="terminal" id="terminal">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-dots">
          <div class="topbar-dot"></div>
          <div class="topbar-dot"></div>
          <div class="topbar-dot"></div>
        </div>
        <div class="topbar-title">🖥 SYSTEM DESKTOP</div>
      </div>
      <div id="clock"></div>
    </div>
    <div class="term-body" id="term-body"></div>
  </div>

  <script src="ter.js"></script>
</body>

</html>
